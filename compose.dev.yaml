# Hot-reload app services. Merges with compose.yaml (shared infra).
# Binds 0.0.0.0 so the stack is reachable on the LAN.
# ml-worker uses the CUDA image + NVIDIA GPU.
#
#   docker compose -f compose.yaml -f compose.dev.yaml up --build

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ox1audio}:${POSTGRES_PASSWORD:-ox1audio}@postgres:5432/${POSTGRES_DB:-ox1audio}
  JWT_SECRET: ${JWT_SECRET:-ox1audio-dev-jwt-secret-change-me}
  # Vite proxies /api → backend (same-origin). Still allow LAN origins for any
  # direct browser→backend calls; do not inherit host-only localhost from .env.
  CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.118:5173
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-ox1audio}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-ox1audio-dev-secret}
  MINIO_BUCKET: ${MINIO_BUCKET:-catalog-audio}
  MINIO_SECURE: "false"
  # In-compose DNS (do not inherit host .env 127.0.0.1 targets).
  ML_WORKER_TARGET: ml-worker:50051
  OLLAMA_BASE_URL: http://ollama:11434
  QDRANT_URL: http://qdrant:6333
  QDRANT_API_KEY: ${QDRANT_API_KEY:-ox1audio-qdrant-dev-key}

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  qdrant:
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

  minio:
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  ollama:
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy

  backend-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ox1audio_backend.worker"]
    environment:
      <<: *backend-env
    volumes:
      - ./apps/backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-worker:
        condition: service_started

  ml-worker:
    build:
      context: ./apps/ml-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-ox1audio-qdrant-dev-key}
      HF_HOME: /models/huggingface
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HOST: 0.0.0.0
      PYTHONPATH: /app/src
    ports:
      - "${ML_WORKER_PORT:-50051}:50051"
    volumes:
      - ./apps/ml-worker:/app
      # Keep image-built .venv when bind-mounting source (matches backend pattern).
      - ml_worker_venv:/app/.venv
      - ml_worker_hf:/models/huggingface
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      # Empty → same-origin /api via Vite proxy (works from any LAN host).
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      DOCKER: "1"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_venv:
    name: ox1audio_backend_venv
  ml_worker_venv:
    name: ox1audio_ml_worker_venv
  ml_worker_hf:
    name: ox1audio_ml_worker_hf
  frontend_node_modules:
    name: ox1audio_frontend_node_modules
