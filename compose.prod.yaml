# Production app services. Merges with compose.yaml (shared infra).
# ml-worker uses the CUDA image + NVIDIA GPU.
#
#   docker compose -f compose.yaml -f compose.prod.yaml up -d --build
#
# Required secrets (no weak defaults): JWT_SECRET, MINIO_ROOT_USER,
# MINIO_ROOT_PASSWORD, QDRANT_API_KEY.

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ox1audio}:${POSTGRES_PASSWORD:-ox1audio}@postgres:5432/${POSTGRES_DB:-ox1audio}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  MINIO_BUCKET: ${MINIO_BUCKET:-catalog-audio}
  MINIO_SECURE: "false"
  ML_WORKER_TARGET: ml-worker:50051
  OLLAMA_BASE_URL: http://ollama:11434
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}

services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  qdrant:
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9100}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-catalog-audio}

  ollama:
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy

  backend-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ox1audio_backend.worker"]
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-worker:
        condition: service_started

  ml-worker:
    build:
      context: ./apps/ml-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      HF_HOME: /models/huggingface
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${ML_WORKER_PORT:-50051}:50051"
    volumes:
      - ml_worker_hf:/models/huggingface
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  ml_worker_hf:
