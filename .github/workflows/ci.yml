name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync and test
        run: |
          uv sync --frozen
          uv run pytest -q
      - name: Protobuf stubs present
        run: test -f src/ox1audio_backend/ml_client/generated/ox1audio/v1/ml_worker_pb2.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  ml-worker-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Protobuf stubs present
        run: test -f apps/ml-worker/src/ox1audio_ml_worker/generated/ox1audio/v1/ml_worker_pb2.py
