syntax = "proto3";

package tunelink.ml.v1;

option py_generic_services = false;

// Shared gRPC surface: backend ingest/search ↔ apps/ml-worker.
// Shapes follow docs/SPEC.md + goodtaste contracts (no organization_id).

service MlWorker {
  rpc AnalyzeTrack(AnalyzeTrackRequest) returns (AnalyzeTrackResponse);
  rpc SearchText(SearchTextRequest) returns (SearchResponse);
  rpc SearchAudio(SearchAudioRequest) returns (SearchResponse);
  rpc SimilarTracks(SimilarTracksRequest) returns (SearchResponse);
  rpc Graph(GraphRequest) returns (GraphResponse);
}

message AnalyzeTrackRequest {
  string job_id = 1;
  string track_id = 2;
  string audio_url = 3;
  string filename = 4;
}

message SegmentAnalysis {
  string id = 1;
  double start_s = 2;
  double end_s = 3;
  string description = 4;
  repeated string tags = 5;
  map<string, float> model_tags = 6;
  map<string, float> mood_scores = 7;
  map<string, float> instrument_scores = 8;
  map<string, float> genre_scores = 9;
  float energy = 10;
  float valence = 11;
  float tension = 12;
}

message WaveformAnalysis {
  int32 version = 1;
  double duration_s = 2;
  int32 sample_count = 3;
  repeated float samples = 4;
}

message AnalyzeTrackResponse {
  string track_id = 1;
  string model_provider = 2;
  string model_version = 3;
  double duration_s = 4;
  optional int32 bpm = 5;
  string genre = 6;
  repeated string mood = 7;
  repeated string tags = 8;
  map<string, float> model_tags = 9;
  map<string, float> mood_scores = 10;
  map<string, float> instrument_scores = 11;
  map<string, float> genre_scores = 12;
  repeated SegmentAnalysis segments = 13;
  WaveformAnalysis waveform = 14;
}

enum SearchMode {
  SEARCH_MODE_UNSPECIFIED = 0;
  SEARCH_MODE_TRACKS = 1;
  SEARCH_MODE_SEGMENTS = 2;
}

message SearchTextRequest {
  string query = 1;
  optional string negative_query = 2;
  int32 top_k = 3;
  SearchMode mode = 4;
}

message SearchAudioRequest {
  string audio_url = 1;
  int32 top_k = 2;
}

message SimilarTracksRequest {
  string track_id = 1;
  int32 top_k = 2;
}

message SearchResult {
  string track_id = 1;
  float score = 2;
  float track_score = 3;
  float best_segment_score = 4;
  float segment_coverage = 5;
  string match_scope = 6;
  repeated string matched_segment_ids = 7;
  repeated string reasons = 8;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message GraphRequest {
  optional string focus_track_id = 1;
  int32 limit = 2;
}

message GraphLink {
  string source = 1;
  string target = 2;
  float weight = 3;
  float audio_weight = 4;
  float profile_weight = 5;
  repeated string reasons = 6;
}

message GraphResponse {
  repeated string node_ids = 1;
  repeated GraphLink links = 2;
}
